<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINALS-TI · 期末周人格鉴定局 | 你是哪种崩溃姿势？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #EAEEF3;
    --paper-line: #D3DBE4;
    --ink: #1F2A3C;
    --ink-soft: #4B5A70;
    --yellow: #FFE066;
    --pink: #FF6F91;
    --green: #06D6A0;
    --coral: #FF6B4A;
    --blue: #5AC8FA;
    --purple: #C29CF0;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background-color: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, var(--paper-line) 0px, var(--paper-line) 1px, transparent 1px, transparent 32px),
      repeating-linear-gradient(90deg, var(--paper-line) 0px, var(--paper-line) 1px, transparent 1px, transparent 32px);
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }

  .stage {
    width: 100%;
    max-width: 560px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .eyebrow::before {
    content: "";
    width: 8px; height: 8px;
    background: var(--coral);
    border-radius: 50%;
    display: inline-block;
  }

  h1.title {
    font-family: 'Kalam', cursive;
    font-size: 44px;
    line-height: 1.05;
    margin: 4px 0 8px;
    position: relative;
    display: inline-block;
  }
  h1.title .hl {
    background: linear-gradient(120deg, var(--yellow) 0%, var(--yellow) 100%);
    background-repeat: no-repeat;
    background-size: 100% 40%;
    background-position: 0 88%;
    padding: 0 2px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* Checklist progress */
  .checklist {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .check-item {
    width: 22px; height: 22px;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--card);
    position: relative;
    flex-shrink: 0;
  }
  .check-item.done {
    background: var(--green);
    border-color: var(--green);
  }
  .check-item.done::after {
    content: "✓";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    font-weight: 700;
  }
  .check-item.current {
    border-color: var(--coral);
    box-shadow: 0 0 0 3px rgba(255,107,74,0.15);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 6px 6px 0 var(--ink);
    margin-bottom: 20px;
  }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--coral);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 22px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }
  .back-btn {
    background: var(--card);
    color: var(--ink-soft);
    border: 2px solid var(--ink-soft);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.12s ease;
    visibility: hidden;
  }
  .back-btn.visible { visibility: visible; }
  .back-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
    background: var(--paper);
  }
  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .option-btn {
    text-align: left;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 16px 18px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15.5px;
    line-height: 1.5;
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .option-btn:hover {
    background: var(--yellow);
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 var(--ink);
  }
  .option-btn:active {
    transform: translate(0, 0);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .start-btn, .restart-btn {
    background: var(--coral);
    color: white;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 16px 28px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .start-btn:hover, .restart-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }
  .start-btn:active, .restart-btn:active {
    transform: translate(0,0);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* Result */
  .result-card {
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 36px 28px 28px;
    box-shadow: 8px 8px 0 var(--ink);
    position: relative;
    overflow: visible;
  }
  /* Sticker avatar */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    padding: 8px;
  }
  .sticker {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 58px;
    position: relative;
    box-shadow: 5px 5px 0 var(--ink);
    transform: rotate(var(--tilt, -4deg));
    flex-shrink: 0;
  }
  .sticker .badge2 {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 36px;
    height: 36px;
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transform: rotate(calc(-1 * var(--tilt, -4deg)));
    box-shadow: 2px 2px 0 var(--ink);
  }

  .gallery-toggle {
    display: block;
    width: 100%;
    background: var(--card);
    border: 2px dashed var(--ink-soft);
    border-radius: 12px;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    margin-top: 4px;
    text-align: center;
  }
  .gallery-toggle:hover { border-color: var(--ink); color: var(--ink); }

  .gallery-grid {
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 12px;
    max-height: 520px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .gallery-grid.open { display: grid; }
  .gallery-cell {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 7px 4px 6px;
    text-align: center;
    cursor: default;
  }
  .gallery-cell.current { background: var(--yellow); }
  .gallery-sticker {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin: 0 auto 4px;
  }
  .gallery-cell .g-name {
    font-size: 10px;
    font-weight: 700;
    line-height: 1.2;
  }
  .gallery-cell .g-code {
    font-size: 9px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-soft);
  }

  /* 结果页：人格图片 */
  .persona-img-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .persona-img {
    width: 240px;
    height: 240px;
    border-radius: 24px;
    border: 4px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    object-fit: cover;
    background: var(--paper);
  }
  /* 五大维度条 */
  .dims-section {
    margin-top: 26px;
    padding-top: 22px;
    border-top: 2px dashed var(--paper-line);
  }
  .dims-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 18px;
    text-align: center;
    letter-spacing: 0.08em;
  }
  .dim-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 13px;
  }
  .dim-label-l, .dim-label-r {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    width: 68px;
    flex-shrink: 0;
    line-height: 1.3;
  }
  .dim-label-l { text-align: right; }
  .dim-label-r { text-align: left; }
  .dim-pct-l, .dim-pct-r {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    width: 34px;
    flex-shrink: 0;
  }
  .dim-pct-l { text-align: right; }
  .dim-pct-r { text-align: left; }
  .dim-bar-wrap {
    flex: 1;
    height: 22px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 11px;
    overflow: hidden;
    position: relative;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 9px;
    transition: width 0.6s ease;
    min-width: 0;
  }
  /* 颜色映射 */
  .bar-ei { background: var(--coral); }
  .bar-sn { background: var(--blue); }
  .bar-tf { background: var(--green); }
  .bar-jp { background: var(--yellow); }
  .bar-ax { background: var(--purple); }
  /* 图库使用图片 */
  .gallery-img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    object-fit: cover;
    margin: 0 auto 5px;
    display: block;
    background: var(--paper);
  }

  .result-tape {
    position: absolute;
    top: -10px; right: 24px;
    background: var(--pink);
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px 8px;
    border-radius: 0 0 6px 6px;
    letter-spacing: 0.06em;
  }
  .result-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: 0.14em;
  }
  .result-name {
    font-family: 'Kalam', cursive;
    font-size: 44px;
    margin: 8px 0 6px;
    line-height: 1.1;
  }
  .result-mbti {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 800;
    background: var(--yellow);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 6px 18px;
    margin-bottom: 20px;
    letter-spacing: 0.04em;
  }
  .result-desc {
    font-size: 16px;
    line-height: 1.8;
    margin-bottom: 18px;
  }
  .quote-block {
    background: var(--paper);
    border-left: 4px solid var(--green);
    padding: 14px 18px;
    font-size: 15px;
    font-style: normal;
    color: var(--ink-soft);
    border-radius: 4px;
    margin-bottom: 20px;
  }
  .quote-block b { color: var(--ink); }

  .traits-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .trait-chip {
    font-size: 12.5px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--ink);
    color: white;
    padding: 5px 11px;
    border-radius: 20px;
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 24px;
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    h1.title { font-size: 34px; }
    .result-name { font-size: 30px; }
    .card, .result-card { padding: 22px 16px; }
    .sticker { width: 100px; height: 100px; font-size: 48px; }
    .sticker .badge2 { width: 30px; height: 30px; font-size: 15px; bottom: -4px; right: -4px; }
    .persona-img { width: 180px; height: 180px; }
    .dim-label-l, .dim-label-r { width: 50px; font-size: 10px; }
    .dim-pct-l, .dim-pct-r { width: 28px; font-size: 9px; }
    .dim-bar-wrap { height: 16px; }
    .dim-row { gap: 3px; }
    .gallery-grid { grid-template-columns: repeat(4, 1fr); gap: 4px; max-height: 400px; }
    .gallery-img { width: 40px; height: 40px; }
    .gallery-sticker { width: 34px; height: 34px; font-size: 17px; }
    .gallery-cell { padding: 5px 2px 5px; }
    .gallery-cell .g-name { font-size: 9px; }
    .gallery-cell .g-code { font-size: 8px; }
  }
</style>
</head>
<body>
<div class="stage">

  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div class="eyebrow">FINALS-TI · 期末周全人格测试</div>
    <h1 class="title">你是哪种<span class="hl">期末周生物</span>？</h1>
    <p class="subtitle">20道灵魂拷问 × 每题4级强度选项，从社交模式、规划哲学、情绪系统、执行引擎、信仰体系五大维度精准扫描你的期末人格。答完解锁专属搞怪称号。</p>
    <div class="card">
      <p style="margin:0 0 20px; font-size:15px; color:var(--ink-soft); line-height:1.7;">
        没有标准答案，选你考试周<b style="color:var(--ink);">最真实</b>的反应就行——哪怕答案很社死。<br>
        <span style="font-size:13px;">● 实心圆 = 这绝对是我　○ 空心圆 = 我偏向这样　🔥 = 典中典</span>
      </p>
      <button class="start-btn" onclick="startQuiz()">开始测试 →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="eyebrow">FINALS-TI</div>
    <div class="checklist" id="checklist"></div>
    <div class="card">
      <div class="q-number" id="q-number">Q1 / 20</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
      <div class="nav-row">
        <button class="back-btn" id="back-btn" onclick="goBack()">← 上一题</button>
        <span class="progress-text" id="progress-text"></span>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="eyebrow">你的期末人格鉴定结果</div>
    <div class="result-card">
      <div class="result-tape">FINALS-TI 鉴定报告</div>
      <!-- 人格图片 -->
      <div class="persona-img-wrap">
        <img class="persona-img" id="res-img" src="" alt="人格图片" />
        <div class="sticker" id="res-img-fallback" style="display:none;margin:0 auto;--tilt:-3deg;"></div>
      </div>
      <!-- 文字信息 -->
      <div class="result-code" id="res-code" style="text-align:center;"></div>
      <div class="result-name" id="res-name" style="text-align:center;"></div>
      <div class="result-mbti" id="res-mbti" style="display:block; width:fit-content; margin:0 auto 18px;"></div>
      <div class="result-desc" id="res-desc"></div>
      <div class="quote-block" id="res-quote"></div>
      <div class="traits-row" id="res-traits"></div>
      <!-- 五大维度占比条 -->
      <div class="dims-section" id="dims-section"></div>
      <button class="restart-btn" onclick="restartQuiz()">再测一次 ↻</button>
      <button class="gallery-toggle" onclick="toggleGallery()" id="gallery-btn">👀 查看全部32种期末人格图鉴</button>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
    <p class="footer-note">截图发朋友圈，看看谁才是真正的期末战神 📸 仅供娱乐，切勿当真~</p>
  </div>

  <!-- 访问统计 - 所有页面底部可见 -->
  <div style="text-align:center;margin-top:20px;padding:12px;">
    <span style="font-size:13px;color:var(--ink-soft);">
      👁️ 总浏览量：<img src="https://hits.sh/shawn030561.github.io/finals-ti-test.svg?style=flat&label=" alt="views" style="height:18px;vertical-align:middle;border:0;" />
    </span>
  </div>

</div>

<script>
const questions = [
  // ═══ EI轴：外向抱团 vs 内向独狼 ═══ 4题
  {
    axis: 'EI',
    text: '复习到一半，手机响了——团支书打来视频通话。你：',
    options: [
      { label: '秒接！正好学累了想找人说说话，聊了半小时', value: 'E', weight: 2 },
      { label: '接了，聊几分钟放松一下，然后继续学', value: 'E', weight: 1 },
      { label: '假装没看到，挂断后发消息"刚才在学不好意思啊"', value: 'I', weight: 1 },
      { label: '秒静音+翻转屏幕朝下——复习期间所有来电都是敌人', value: 'I', weight: 2 }
    ]
  },
  {
    axis: 'EI',
    text: '班群有人发起"期末复习每日打卡接龙"，你：',
    options: [
      { label: '立刻接龙！每天坚持打卡，还会主动@没打的人："就差你了！"', value: 'E', weight: 2 },
      { label: '接了，偶尔打卡，"看看别人进度还挺有动力的"', value: 'E', weight: 1 },
      { label: '默默围观不参与，但会偷偷看别人打卡内容参考进度', value: 'I', weight: 1 },
      { label: '设置群消息免打扰——"打卡接龙是效率最低的自我感动行为"', value: 'I', weight: 2 }
    ]
  },
  {
    axis: 'EI',
    text: '考完试大家在群里热烈讨论答案，你：',
    options: [
      { label: '立刻加入混战！逐题对答案，一个人对战全班："我选B！肯定B！"', value: 'E', weight: 2 },
      { label: '围观一下讨论，偶尔插一句自己拿不准的题', value: 'E', weight: 1 },
      { label: '瞥了两眼群消息，默默拿出书开始对答案但不发言', value: 'I', weight: 1 },
      { label: '直接屏蔽群——"对答案是考后第一酷刑，求求你们别对了"', value: 'I', weight: 2 }
    ]
  },
  {
    axis: 'EI',
    text: '你发现一个知识点三种教材讲法都不一样，你：',
    options: [
      { label: '截图发学习群引发一场大讨论——"兄弟们来评评理！"', value: 'E', weight: 2 },
      { label: '私聊问几个同学他们老师怎么讲的，综合一下', value: 'E', weight: 1 },
      { label: '自己查更多资料对比，综合出自己的理解版本', value: 'I', weight: 1 },
      { label: '关掉所有教材——"既然你们说不清楚，那我按自己的来"', value: 'I', weight: 2 }
    ]
  },
  // ═══ SN轴：计划控 vs 随性流 ═══ 4题
  {
    axis: 'SN',
    text: '你要同时复习5门课，你的策略是？',
    options: [
      { label: '列出每门课知识点清单，按考试时间×学分权重排出优先级矩阵', value: 'S', weight: 2 },
      { label: '按考试顺序一门门来，每门分配固定天数', value: 'S', weight: 1 },
      { label: '今天想学哪门学哪门，主打一个"随心"和"缘分"', value: 'N', weight: 1 },
      { label: '5门？？打开一门看了5分钟→换另一门→再换→每门都只看了第一章', value: 'N', weight: 2 }
    ]
  },
  {
    axis: 'SN',
    text: '学校突然通知考试提前了一周，你：',

// 计算五大维度得分（0-100%）
function getDimensionScores() {
  const axes = [
    { key: 'EI',   left: 'E', right: 'I', label: '社交模式', leftLabel: '外向抱团', rightLabel: '内向独狼' },
    { key: 'SN',   left: 'S', right: 'N', label: '规划哲学', leftLabel: '计划控',   rightLabel: '随性流' },
    { key: 'TF',   left: 'T', right: 'F', label: '情绪系统', leftLabel: '理性机器', rightLabel: '感性生物' },
    { key: 'JP',   left: 'J', right: 'P', label: '执行引擎', leftLabel: '卷王引擎', rightLabel: '摆烂模式' },
    { key: 'AX',   left: 'A', right: 'X', label: '信仰体系', leftLabel: '科学实干', rightLabel: '玄学祈福' }
  ];
  return axes.map(ax => {
    const list = answers[ax.key] || [];
    const total = list.length;
    if (total === 0) return { ...ax, leftPct: 50, rightPct: 50, dominant: ax.leftLabel, domPct: 50 };
    const leftCount = list.filter(v => v === ax.left).length;
    const rightCount = total - leftCount;
    const leftPct = Math.round((leftCount / total) * 100);
    const rightPct = 100 - leftPct;
    const dominant = leftPct >= rightPct ? ax.leftLabel : ax.rightLabel;
    const domPct = Math.max(leftPct, rightPct);
    return { ...ax, leftPct, rightPct, dominant, domPct };
  });
}

let currentQ = 0;
let answers = {};
let answerHistory = []; // {axis, value, weight} 用于回退

function startQuiz() {
  currentQ = 0;
  answers = {};
  answerHistory = [];
  showScreen('screen-quiz');
  renderChecklist();
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderChecklist() {
  const el = document.getElementById('checklist');
  el.innerHTML = '';
  for (let i = 0; i < questions.length; i++) {
    const div = document.createElement('div');
    div.className = 'check-item';
    if (i < currentQ) div.classList.add('done');
    if (i === currentQ) div.classList.add('current');
    el.appendChild(div);
  }
}

function renderQuestion() {
  if (currentQ >= questions.length) {
    showResult();
    return;
  }
  const q = questions[currentQ];
  if (!q) {
    console.error('Question not found at index', currentQ);
    showResult();
    return;
  }
  document.getElementById('q-number').textContent = `Q${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  const optsEl = document.getElementById('q-options');
  optsEl.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    const intensityLabel = opt.weight === 2 ? ' 🔥' : '';
    btn.innerHTML = `<span class="opt-intensity" style="font-size:11px;color:var(--ink-soft);margin-right:6px;">${opt.weight === 2 ? '●' : '○'}</span>${opt.label}${intensityLabel}`;
    btn.onclick = () => selectAnswer(q.axis, opt.value, opt.weight);
    if (opt.weight === 2) {
      btn.style.borderWidth = '3px';
      btn.style.fontWeight = '600';
    }
    optsEl.appendChild(btn);
  });
  // 返回按钮：第一题隐藏，其余显示
  const backBtn = document.getElementById('back-btn');
  const progressText = document.getElementById('progress-text');
  if (currentQ === 0) {
    backBtn.classList.remove('visible');
  } else {
    backBtn.classList.add('visible');
  }
  progressText.textContent = `${currentQ} / ${questions.length} 已答`;
}

function selectAnswer(axis, value, weight) {
  if (!answers[axis]) answers[axis] = [];
  // 按权重多次推入，使强偏好比弱偏好影响力更大
  for (let i = 0; i < weight; i++) {
    answers[axis].push(value);
  }
  // 记录答题历史，用于回退
  answerHistory.push({ axis, value, weight });
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    renderChecklist();
    renderQuestion();
  }
}

function goBack() {
  if (currentQ <= 0 || answerHistory.length === 0) return;
  // 弹出最后一题的答题记录
  const last = answerHistory.pop();
  // 从 answers 中移除对应数量的值
  const arr = answers[last.axis];
  if (arr) {
    for (let i = 0; i < last.weight; i++) {
      // 从尾部移除（后进先出）
      const idx = arr.lastIndexOf(last.value);
      if (idx !== -1) arr.splice(idx, 1);
    }
  }
  currentQ--;
  renderChecklist();
  renderQuestion();
}

function tally(axis, a, b) {
  const list = answers[axis] || [];
  const countA = list.filter(v => v === a).length;
  const countB = list.filter(v => v === b).length;
  return countA >= countB ? a : b;
}

function showResult() {
  try {
    const type =
      tally('EI', 'E', 'I') +
      tally('SN', 'S', 'N') +
      tally('TF', 'T', 'F') +
      tally('JP', 'J', 'P') +
      '-' +
      tally('AX', 'A', 'X');

    let p = personas[type];
    if (!p) {
      console.warn('Unknown type:', type, '— falling back to first persona');
      p = personas[Object.keys(personas)[0]];
    }

    // 渲染人格图片
    const imgEl = document.getElementById('res-img');
    const imgFile = personaImages[p.code];
    imgEl.src = imgFile ? IMG_DIR + imgFile : '';
    imgEl.alt = p.name;
    imgEl.onerror = function() {
      // 图片加载失败时显示 emoji 兜底
      this.style.display = 'none';
      const fallback = document.getElementById('res-img-fallback');
      if (fallback) {
        fallback.style.display = 'flex';
        fallback.textContent = p.emoji;
      }
    };

    document.getElementById('res-code').textContent = p.code;
    document.getElementById('res-name').textContent = p.name;
    document.getElementById('res-mbti').textContent = `人格编码 · ${p.mbti}（基于五大维度）`;
    document.getElementById('res-desc').textContent = p.desc;
    document.getElementById('res-quote').innerHTML = `<b>崩溃语录：</b>${p.quote}`;

    const traitsEl = document.getElementById('res-traits');
    traitsEl.innerHTML = '';
    p.traits.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'trait-chip';
      chip.textContent = t;
      traitsEl.appendChild(chip);
    });

    // 渲染五大维度占比条（双边对比，占比多者高亮，100%时全彩）
    const dimsEl = document.getElementById('dims-section');
    const scores = getDimensionScores();
    const barColors = ['bar-ei', 'bar-sn', 'bar-tf', 'bar-jp', 'bar-ax'];
    dimsEl.innerHTML = '<div class="dims-title">— 五大维度分析 —</div>';
    scores.forEach((s, i) => {
      const leftDom = s.leftPct >= s.rightPct;
      // 条始终显示占优方的比例，始终用彩色
      const barPct = leftDom ? s.leftPct : s.rightPct;
      const barAlign = leftDom ? 'left' : 'right';
      const row = document.createElement('div');
      row.className = 'dim-row';
      row.innerHTML = `
        <div class="dim-label-l" style="color:${leftDom ? 'var(--ink)' : 'var(--ink-soft)'};font-weight:${leftDom ? '700' : '400'};">${s.leftLabel}</div>
        <div class="dim-pct-l" style="color:${leftDom ? 'var(--ink)' : 'var(--ink-soft)'};font-weight:${leftDom ? '700' : '400'};">${s.leftPct}%</div>
        <div class="dim-bar-wrap">
          <div class="dim-bar-fill ${barColors[i]}" style="width:${barPct}%;margin-left:${barAlign === 'right' ? 'auto' : '0'};margin-right:${barAlign === 'left' ? 'auto' : '0'};"></div>
        </div>
        <div class="dim-pct-r" style="color:${!leftDom ? 'var(--ink)' : 'var(--ink-soft)'};font-weight:${!leftDom ? '700' : '400'};">${s.rightPct}%</div>
        <div class="dim-label-r" style="color:${!leftDom ? 'var(--ink)' : 'var(--ink-soft)'};font-weight:${!leftDom ? '700' : '400'};">${s.rightLabel}</div>
      `;
      dimsEl.appendChild(row);
    });

    showScreen('screen-result');
  } catch (e) {
    console.error('showResult error:', e);
    alert('出错了！请刷新页面重试。错误：' + e.message);
  }
}

    renderGallery();

}

  const entries = Object.entries(personas);

      '-' +
      tally('AX', 'A', 'X');

  entries.forEach(([type, p]) => {

      <div class="g-code">${p.code}</div>
    `;
    grid.appendChild(cell);
  });
}
</script>
</body>
